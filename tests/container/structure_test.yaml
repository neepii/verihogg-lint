schemaVersion: "2.0.0"

fileExistenceTests:

  - name: "Binary symlink exists at Nix profile path"
    path: "/nix/var/nix/profiles/default/bin/verihogg-lint"
    shouldExist: true

  - name: "Test fixtures directory exists"
    path: "/verihogg-test-fixtures"
    shouldExist: true

  - name: "Test runner script exists"
    path: "/usr/local/bin/run_tests.sh"
    shouldExist: true

commandTests:

  - name: "Binary starts without crash (no args)"
    command: "/nix/var/nix/profiles/default/bin/verihogg-lint"
    args: []
    exitCode: 1
    expectedError: ["no input files"]

  - name: "All rule fixtures: NoError→exit 0, RaiseError→exit non-zero"
    command: "/usr/local/bin/run_tests.sh"
    args: []
    exitCode: 0
    expectedOutput: ["Failed=0"]